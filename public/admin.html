<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Gladiatus Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --surface2:  #1a1d24;
      --border:    #2a2d36;
      --accent:    #6c63ff;
      --accent2:   #8b7fff;
      --green:     #22c55e;
      --yellow:    #f59e0b;
      --red:       #ef4444;
      --text:      #e2e4ea;
      --muted:     #6b7280;
      --radius:    12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── LOGIN ──────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(108,99,255,0.1);
    }
    .login-logo {
      font-size: 32px;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .login-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-error {
      font-size: 13px;
      color: var(--red);
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* ─── BOTONES ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
      padding: 13px;
      margin-top: 20px;
      font-size: 15px;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-green  { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .btn-red    { background: rgba(239,68,68,0.15);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
    .btn-purple { background: rgba(108,99,255,0.15); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); }
    .btn-green:hover  { background: rgba(34,197,94,0.3); }
    .btn-red:hover    { background: rgba(239,68,68,0.3); }
    .btn-purple:hover { background: rgba(108,99,255,0.3); }

    /* ─── LAYOUT PRINCIPAL ───────────────────────────────────── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 17px;
    }
    .header-left span { font-size: 22px; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .server-url {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    /* ─── STATS ──────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label { font-size: 13px; color: var(--muted); }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red    { color: var(--red); }
    .stat-value.purple { color: var(--accent); }

    /* ─── SECCIÓN OTORGAR ────────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .grant-form {
      display: grid;
      grid-template-columns: 1fr 140px 1fr auto;
      gap: 12px;
      align-items: end;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .grant-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .grant-btn:hover { background: var(--accent2); }
    .grant-message {
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .grant-message.ok    { background: rgba(34,197,94,0.1);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .grant-message.error { background: rgba(239,68,68,0.1);  color: var(--red);   border: 1px solid rgba(239,68,68,0.2); }

    /* ─── TABLA ──────────────────────────────────────────────── */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      width: 240px;
    }
    .search-input:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-red    { background: rgba(239,68,68,0.15);  color: var(--red); }

    .days-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .days-bar {
      flex: 1; height: 4px; background: var(--border);
      border-radius: 99px; overflow: hidden; min-width: 80px;
    }
    .days-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }

    .user-id { font-family: monospace; font-size: 13px; color: var(--accent2); }
    .note-text { font-size: 12px; color: var(--muted); }
    .actions { display: flex; gap: 8px; }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state div { font-size: 40px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    /* ─── TOAST ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok    { border-color: rgba(34,197,94,0.4); color: var(--green); }
    #toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }

    @media (max-width: 700px) {
      .grant-form { grid-template-columns: 1fr 1fr; }
      main { padding: 16px; }
      header { padding: 0 16px; }
      .server-url { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚔️</div>
    <div class="login-title">Panel de Administración</div>
    <div class="login-sub">Gladiatus Bot — Servidor Personal</div>

    <label for="pwd-input">Contraseña de administrador</label>
    <input type="password" id="pwd-input" placeholder="••••••••••••" autocomplete="current-password" />
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
    <button class="btn btn-primary" id="login-btn">Entrar al panel</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ APP -->
<div id="app">

  <header>
    <div class="header-left">
      <span>⚔️</span> Gladiatus Bot Admin
    </div>
    <div class="header-right">
      <div class="online-dot"></div>
      <span id="server-url-display" class="server-url">cargando...</span>
      <button class="btn btn-sm btn-red" id="logout-btn">Salir</button>
    </div>
  </header>

  <main>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Licencias activas</div>
        <div class="stat-value green" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Solicitudes pendientes</div>
        <div class="stat-value yellow" id="stat-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expiradas</div>
        <div class="stat-value red" id="stat-expired">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total usuarios</div>
        <div class="stat-value purple" id="stat-total">—</div>
      </div>
    </div>

    <!-- Otorgar licencia -->
    <div class="section">
      <div class="section-title">➕ Otorgar / Extender Licencia</div>
      <div class="grant-form">
        <div class="form-group">
          <label>Player ID (userId)</label>
          <input type="text" id="grant-userid" placeholder="ej. 123456" />
        </div>
        <div class="form-group">
          <label>Días de acceso</label>
          <input type="number" id="grant-days" placeholder="30" min="1" max="3650" value="30" />
        </div>
        <div class="form-group">
          <label>Nota (opcional)</label>
          <input type="text" id="grant-note" placeholder="ej. Amigo de confianza" />
        </div>
        <button class="grant-btn" id="grant-btn">✅ Otorgar</button>
      </div>
      <div class="grant-message" id="grant-message"></div>
    </div>

    <!-- Tabla de usuarios -->
    <div class="section">
      <div class="table-header">
        <div class="section-title" style="margin:0">👥 Usuarios con Licencia</div>
        <div style="display:flex;gap:10px;align-items:center">
          <input type="text" class="search-input" id="search" placeholder="🔍 Buscar userId..." />
          <button class="btn btn-sm btn-purple" id="refresh-btn">⟳ Actualizar</button>
        </div>
      </div>

      <div id="table-container">
        <div class="loading">Cargando licencias...</div>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── Configuración ─────────────────────────────────────────────────────────
  const BASE_URL = window.location.origin;
  let adminPassword = '';
  let allLicenses   = [];

  // ── Mostrar URL del servidor ───────────────────────────────────────────────
  document.getElementById('server-url-display').textContent = BASE_URL;

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3200);
  }

  // ── Login ──────────────────────────────────────────────────────────────────
  async function tryLogin() {
    const pwd = document.getElementById('pwd-input').value.trim();
    if (!pwd) return;

    const res = await fetch(`${BASE_URL}/api/admin/licenses`, {
      headers: { 'X-Admin-Password': pwd }
    });

    if (res.ok) {
      adminPassword = pwd;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderTable(await res.json());
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  document.getElementById('login-btn').addEventListener('click', tryLogin);
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    adminPassword = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  });

  // ── Cargar licencias ───────────────────────────────────────────────────────
  async function loadLicenses() {
    document.getElementById('table-container').innerHTML = '<div class="loading">Cargando...</div>';
    try {
      const res = await fetch(`${BASE_URL}/api/admin/licenses`, {
        headers: { 'X-Admin-Password': adminPassword }
      });
      if (!res.ok) return;
      allLicenses = await res.json();
      renderTable(allLicenses);
    } catch {
      showToast('Error al cargar licencias', 'error');
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', loadLicenses);

  // ── Filtro de búsqueda ─────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderTable(allLicenses.filter(l =>
      l.userId.toLowerCase().includes(q) ||
      (l.note || '').toLowerCase().includes(q)
    ));
  });

  // ── Render tabla ───────────────────────────────────────────────────────────
  function renderTable(licenses) {
    // Actualizar stats
    const active  = licenses.filter(l => l.status === 'active').length;
    const pending = licenses.filter(l => l.status === 'pending').length;
    const expired = licenses.filter(l => l.status === 'expired').length;
    document.getElementById('stat-active').textContent  = active;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-expired').textContent = expired;
    document.getElementById('stat-total').textContent   = licenses.length;

    if (!licenses.length) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-state"><div>🏜️</div>No hay usuarios todavía</div>';
      return;
    }

    const rows = licenses.map(l => {
      const badgeClass = l.status === 'active' ? 'badge-green'
                       : l.status === 'pending' ? 'badge-yellow'
                       : 'badge-red';
      const badgeLabel = l.status === 'active'  ? '● Activo'
                       : l.status === 'pending' ? '◐ Pendiente'
                       : '✕ Expirado';

      const pct    = l.status === 'active' ? Math.min(100, (l.daysLeft / (l.duration || 30)) * 100) : 0;
      const barClr = pct > 50 ? '#22c55e' : pct > 20 ? '#f59e0b' : '#ef4444';

      const expStr = l.expiresAtHuman
        ? new Date(l.expiresAtHuman).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' })
        : '—';

      return `<tr>
        <td><span class="user-id">${l.userId}</span></td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td>
          <div class="days-bar-wrap">
            <span>${l.status === 'active' ? l.daysLeft + 'd' : '—'}</span>
            <div class="days-bar">
              <div class="days-bar-fill" style="width:${pct}%;background:${barClr}"></div>
            </div>
          </div>
        </td>
        <td>${expStr}</td>
        <td><span class="note-text">${l.note || ''}</span></td>
        <td>
          <div class="actions">
            ${l.status !== 'active' ? `<button class="btn btn-sm btn-green" onclick="quickGrant('${l.userId}')">✅ Aprobar 30d</button>` : ''}
            <button class="btn btn-sm btn-purple" onclick="extendLicense('${l.userId}')">+días</button>
            <button class="btn btn-sm btn-red"    onclick="revokeLicense('${l.userId}')">Revocar</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('table-container').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Player ID</th>
            <th>Estado</th>
            <th>Días restantes</th>
            <th>Expira</th>
            <th>Nota</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ── Otorgar licencia ───────────────────────────────────────────────────────
  document.getElementById('grant-btn').addEventListener('click', async () => {
    const userId = document.getElementById('grant-userid').value.trim();
    const days   = parseInt(document.getElementById('grant-days').value) || 30;
    const note   = document.getElementById('grant-note').value.trim();
    const msg    = document.getElementById('grant-message');

    if (!userId) {
      msg.textContent = '⚠️ Introduce un Player ID';
      msg.className = 'grant-message error';
      msg.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${BASE_URL}/api/admin/license`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': adminPassword,
        },
        body: JSON.stringify({ userId, days, note }),
      });

      const data = await res.json();
      if (res.ok) {
        msg.textContent = `✅ Licencia otorgada a ${userId} por ${days} días. Expira: ${new Date(data.license.expiresAt).toLocaleDateString('es-ES')}`;
        msg.className = 'grant-message ok';
        document.getElementById('grant-userid').value = '';
        document.getElementById('grant-note').value   = '';
        loadLicenses();
        showToast(`✅ Licencia otorgada a ${userId}`);
      } else {
        msg.textContent = '❌ Error: ' + (data.error || 'desconocido');
        msg.className = 'grant-message error';
      }
    } catch {
      msg.textContent = '❌ Error de conexión';
      msg.className = 'grant-message error';
    }
    msg.style.display = 'block';
  });

  // ── Aprobar rápido ─────────────────────────────────────────────────────────
  async function quickGrant(userId) {
    await fetch(`${BASE_URL}/api/admin/license`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ userId, days: 30, note: 'Aprobado desde panel' }),
    });
    showToast(`✅ Aprobado: ${userId}`);
    loadLicenses();
  }

  // ── Extender licencia ──────────────────────────────────────────────────────
  async function extendLicense(userId) {
    const days = parseInt(prompt(`¿Cuántos días añadir a ${userId}?`, '30'));
    if (!days || days <= 0) return;

    const res = await fetch(`${BASE_URL}/api/admin/license`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ userId, days, note: 'Extensión desde panel' }),
    });

    if (res.ok) {
      showToast(`✅ Extendido ${days}d para ${userId}`);
      loadLicenses();
    } else {
      showToast('❌ Error al extender', 'error');
    }
  }

  // ── Revocar licencia ───────────────────────────────────────────────────────
  async function revokeLicense(userId) {
    if (!confirm(`¿Revocar acceso a ${userId}? Esta acción desactivará su bot inmediatamente.`)) return;

    const res = await fetch(`${BASE_URL}/api/admin/license`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ userId }),
    });

    if (res.ok) {
      showToast(`🗑️ Acceso revocado: ${userId}`);
      loadLicenses();
    } else {
      showToast('❌ Error al revocar', 'error');
    }
  }

  // Exponer funciones globales para los botones de la tabla
  window.quickGrant     = quickGrant;
  window.extendLicense  = extendLicense;
  window.revokeLicense  = revokeLicense;
</script>
</body>
</html>
