<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botillo Pro | Diamond Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b0f1a;
            --card-bg: rgba(22, 30, 46, 0.8);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --danger: #ef4444;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.12) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Nav --- */
        nav {
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-fill-color: transparent; color: transparent; }

        .nav-links { display: flex; gap: 2rem; }
        .nav-tab { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; position: relative; padding: 0.5rem 0; }
        .nav-tab:hover { color: var(--text); }
        .nav-tab.active { color: var(--text); }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--primary); border-radius: 2px; }

        .container { width: 100%; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; flex: 1; }

        .view { display: none; animation: fadeIn 0.3s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Metrics Container --- */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1.5rem; text-align: center; }
        .metric-value { font-size: 2.5rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; }
        .metric-label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Other Styles --- */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.25rem; padding: 2rem; margin-bottom: 2rem; }
        h2 { font-size: 1.6rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-weight: 600; font-size: 0.85rem; }
        input, textarea, select {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; color: var(--text); font-family: inherit; font-size: 1rem; transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn {
            background: linear-gradient(to right, var(--primary), var(--primary-hover)); color: white; border: none; border-radius: 0.75rem; padding: 1rem 2.5rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--primary); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); }

        .search-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .search-bar input { flex: 1; }
        .search-bar select { width: 150px; }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 1rem; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; }
        .badge-banned { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        /* --- Modal --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--border); border-radius: 1.5rem; width: 100%; max-width: 500px; padding: 2rem; position: relative; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <h1>BOTILLO <span style="color:var(--primary)">PRO</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Acceso Administrativo de Élite</p>
            <input type="password" id="admin-token" placeholder="Token Secreto" style="margin-bottom: 1.5rem;">
            <button class="btn" id="login-btn" style="width: 100%;">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <nav class="hidden" id="navigation">
        <div class="logo">BOTILLO PRO</div>
        <div class="nav-links">
            <div class="nav-tab active" data-view="dashboard">📊 Dashboard</div>
            <div class="nav-tab" data-view="users">👥 Usuarios</div>
            <div class="nav-tab" data-view="licenses">🔑 Licencias</div>
            <div class="nav-tab" data-view="system">⚙️ Sistema</div>
        </div>
        <div id="global-indicator" style="font-size: 0.8rem; font-weight: 700; color: var(--success);">● SISTEMA ESTABLE</div>
    </nav>

    <div class="container hidden" id="main-content">
        
        <!-- Vista: Dashboard -->
        <div class="view active" id="view-dashboard">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="stat-total-users">0</div>
                    <div class="metric-label">Usuarios Totales</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="stat-active-today" style="color:var(--success)">0</div>
                    <div class="metric-label">Activos Hoy</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="stat-licenses" style="color:var(--accent)">0</div>
                    <div class="metric-label">Licencias Activas</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="stat-bans" style="color:var(--danger)">0</div>
                    <div class="metric-label">Baneos</div>
                </div>
            </div>

            <div class="card">
                <h2>📢 Anuncio Global</h2>
                <div class="form-group">
                    <label>Este mensaje aparece como banner en todos los bots activos.</label>
                    <textarea id="broadcast-msg" rows="2" placeholder="Ej: ¡Nuevo servidor de Discord disponible!"></textarea>
                </div>
                <button class="btn" id="save-broadcast-btn">Actualizar Anuncio</button>
            </div>
        </div>

        <!-- Vista: Usuarios -->
        <div class="view" id="view-users">
            <div class="card">
                <h2>👥 Gestión de Usuarios</h2>
                <div class="search-bar">
                    <input type="text" id="user-search" placeholder="Buscar por Nombre o ID...">
                    <select id="server-filter">
                        <option value="">Cualquier Servidor</option>
                    </select>
                    <button class="btn btn-outline" id="refresh-users">🔄</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>Jugador</th>
                                <th>Srv</th>
                                <th>Lvl</th>
                                <th>Oro</th>
                                <th>Última Vez</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- El resto de las vistas se mantienen similares pero estilizadas... -->
        <!-- Vista Licencias omitida por brevedad en este chunk, se integrará en el archivo final -->

    </div>

    <!-- Modal de Usuario -->
    <div class="modal" id="user-modal">
        <div class="modal-content">
            <h2 id="modal-user-name">Usuario</h2>
            <p id="modal-user-id" style="color:var(--text-dim); margin-bottom: 2rem;">ID: ...</p>
            
            <div class="form-group">
                <label>Notas de Administrador (Privado)</label>
                <textarea id="user-notes" rows="4" placeholder="Escribe aquí anotaciones sobre este usuario..."></textarea>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn" id="save-user-notes" style="flex: 1;">Guardar Nota</button>
                <button class="btn btn-danger" id="toggle-ban-btn" style="flex: 1;">Banear Usuario</button>
            </div>
            <button class="btn btn-outline" onclick="closeModal()" style="width: 100%; margin-top: 1rem; border:none;">Cerrar</button>
        </div>
    </div>

    <script>
        let adminToken = '';
        let allUsers = [];
        let selectedUserId = null;

        const api = {
            async get(action) {
                const res = await fetch(`/api/admin?action=${action}`, { headers: { 'x-admin-token': adminToken } });
                return res.ok ? await res.json() : null;
            },
            async post(action, body) {
                const res = await fetch(`/api/admin?action=${action}`, {
                    method: 'POST',
                    headers: { 'x-admin-token': adminToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                return res.ok;
            }
        };

        // --- Auth ---
        document.getElementById('login-btn').onclick = async () => {
            adminToken = document.getElementById('admin-token').value;
            const res = await api.get('getStats');
            if (res) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('navigation').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                updateDashboard(res);
            }
        };

        // --- Dashboard ---
        async function updateDashboard(stats) {
            if (!stats) stats = await api.get('getStats');
            document.getElementById('stat-total-users').innerText = stats.totalUsers;
            document.getElementById('stat-active-today').innerText = stats.activeToday;
            document.getElementById('stat-licenses').innerText = stats.totalLicenses;
            document.getElementById('stat-bans').innerText = stats.totalBans;

            const config = await api.get('');
            document.getElementById('broadcast-msg').value = config.m || '';
        }

        // --- Navigation ---
        document.querySelectorAll('.nav-tab').forEach(t => {
            t.onclick = async () => {
                document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                const viewId = 'view-' + t.dataset.view;
                document.getElementById(viewId).classList.add('active');
                if (viewId === 'view-dashboard') updateDashboard();
                if (viewId === 'view-users') loadUsers();
            };
        });

        // --- Users ---
        async function loadUsers() {
            allUsers = await api.get('getUsers');
            renderUsers();
            
            // Populate servers
            const servers = [...new Set(allUsers.map(u => u.server))];
            const filter = document.getElementById('server-filter');
            filter.innerHTML = '<option value="">Cualquier Servidor</option>';
            servers.forEach(s => {
                filter.innerHTML += `<option value="${s}">Servidor ${s}</option>`;
            });
        }

        function renderUsers() {
            const query = document.getElementById('user-search').value.toLowerCase();
            const srv = document.getElementById('server-filter').value;
            const tbody = document.querySelector('#users-table tbody');
            tbody.innerHTML = '';
            
            allUsers.filter(u => {
                const matchesSearch = u.name.toLowerCase().includes(query) || u.id.includes(query);
                const matchesServer = !srv || u.server == srv;
                return matchesSearch && matchesServer;
            }).forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <strong>${u.name}</strong> ${u.banned ? '<span class="badge badge-banned">Baneado</span>' : ''}
                        <div style="font-size:0.7rem; color:var(--text-dim)">${u.id}</div>
                    </td>
                    <td>S${u.server}</td>
                    <td style="color:var(--accent); font-weight:700">${u.level}</td>
                    <td style="color:#facc15">${parseInt(u.gold).toLocaleString()}</td>
                    <td>${new Date(u.lastSeen).toLocaleTimeString()}</td>
                    <td><button class="btn btn-outline" style="padding:0.4rem 0.8rem; font-size:0.7rem" onclick="openUserModal('${u.id}')">GESTIONAR</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('user-search').oninput = renderUsers;
        document.getElementById('server-filter').onchange = renderUsers;
        document.getElementById('refresh-users').onclick = loadUsers;

        function openUserModal(id) {
            const u = allUsers.find(x => x.id === id);
            selectedUserId = id;
            document.getElementById('modal-user-name').innerText = u.name;
            document.getElementById('modal-user-id').innerText = 'ID: ' + id;
            document.getElementById('user-notes').value = u.note || '';
            document.getElementById('toggle-ban-btn').innerText = u.banned ? 'DESBANEAR' : 'BANEAR USUARIO';
            document.getElementById('user-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('user-modal').classList.remove('active'); }

        document.getElementById('save-user-notes').onclick = async () => {
            const note = document.getElementById('user-notes').value;
            await api.post('setUserNote', { id: selectedUserId, note });
            alert('Nota guardada.');
            loadUsers();
        };

        document.getElementById('toggle-ban-btn').onclick = async () => {
            const u = allUsers.find(x => x.id === selectedUserId);
            if (confirm(`¿Seguro que quieres ${u.banned ? 'DESBANEAR' : 'BANEAR'} a este usuario?`)) {
                await api.post('banUser', { id: selectedUserId, ban: !u.banned });
                closeModal();
                loadUsers();
            }
        };

        document.getElementById('save-broadcast-btn').onclick = async () => {
            const msg = document.getElementById('broadcast-msg').value;
            const config = await api.get('');
            config.m = msg;
            await api.post('', config);
            alert('Anuncio actualizado.');
        };
    </script>
</body>
</html>
