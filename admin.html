<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botillo Pro | Diamond Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --bg: #0b0f1a; --card-bg: rgba(22, 30, 46, 0.8);
            --text: #f8fafc; --text-dim: #94a3b8; --accent: #22d3ee; --danger: #ef4444; --success: #10b981;
            --border: rgba(255, 255, 255, 0.08); --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.12) 0px, transparent 50%);
        }
        nav { background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-tab { color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 0.5rem 0; position: relative; transition: 0.2s; }
        .nav-tab.active { color: var(--text); }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--primary); }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.25rem; padding: 2rem; margin-bottom: 2rem; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1.5rem; text-align: center; }
        .metric-value { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.25rem; }
        .metric-label { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; font-weight: 600; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; }
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; color: white; font-family: inherit; }
        .btn { background: var(--primary); color: white; border: none; border-radius: 0.75rem; padding: 1rem 2rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1rem; color: var(--text-dim); font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; width: 400px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h1 style="margin-bottom:1rem">BOTILLO PRO</h1>
            <input type="password" id="admin-token" placeholder="Token" style="margin-bottom:1rem">
            <button class="btn" id="login-btn" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <nav class="hidden" id="navigation">
        <div class="logo">BOTILLO PRO</div>
        <div class="nav-links">
            <div class="nav-tab active" data-view="dashboard">📊 Dashboard</div>
            <div class="nav-tab" data-view="users">👥 Usuarios</div>
            <div class="nav-tab" data-view="licenses">🔑 Licencias</div>
            <div class="nav-tab" data-view="system">⚙️ Sistema</div>
        </div>
    </nav>

    <div class="container hidden" id="main-content">
        <div class="view active" id="view-dashboard">
            <div class="metrics-grid">
                <div class="metric-card"><div class="metric-value" id="stat-total-users">0</div><div class="metric-label">Total</div></div>
                <div class="metric-card"><div class="metric-value" id="stat-active-today" style="color:var(--success)">0</div><div class="metric-label">Hoy</div></div>
                <div class="metric-card"><div class="metric-value" id="stat-bans" style="color:var(--danger)">0</div><div class="metric-label">Banes</div></div>
            </div>
            <div class="card">
                <h2>📢 Anuncio Global</h2>
                <textarea id="broadcast-msg" rows="2" style="margin-bottom:1rem"></textarea>
                <button class="btn" id="save-broadcast-btn">Actualizar</button>
            </div>
        </div>

        <div class="view" id="view-users">
            <div class="card">
                <h2>👥 Usuarios</h2>
                <div class="table-container">
                    <table id="users-table">
                        <thead><tr><th>Jugador</th><th>Srv</th><th>Lvl</th><th>Visto</th><th>Acción</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="view" id="view-licenses">
            <div class="card">
                <h2>🔑 Licencia Individual</h2>
                <div class="form-group"><label>User ID</label><input type="text" id="target-user-id"></div>
                <div class="form-group"><label>Expiración</label><input type="datetime-local" id="target-expiry"></div>
                <button class="btn" id="save-license-btn">Guardar</button>
            </div>
            <div class="card">
                <h3>Lista VIP</h3>
                <div class="table-container"><table id="lic-table"><thead><tr><th>ID</th><th>Expira</th><th>Acción</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>

        <div class="view" id="view-system">
            <div class="card">
                <h2>⚙️ Sistema</h2>
                <div class="form-group"><label>Modo Mantenimiento</label><input type="checkbox" id="maint-mode" style="width:20px"></div>
                <div class="form-group"><label>Días Regalo Global</label><input type="number" id="gift-days"></div>
                <button class="btn" id="save-system-btn">Guardar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="user-modal">
        <div class="modal-content">
            <h2 id="modal-name"></h2>
            <textarea id="user-note" rows="3" style="margin: 1rem 0"></textarea>
            <button class="btn" id="ban-btn" style="background:var(--danger); width:100%">BANEAR</button>
            <button class="btn" onclick="closeModal()" style="background:none; width:100%; margin-top:0.5rem">Cerrar</button>
        </div>
    </div>

    <script>
        let adminToken = ''; let allUsers = []; let selectedId = null;
        const api = {
            async req(action, method='GET', body=null) {
                const url = `/api/admin${action ? '?action='+action : ''}`;
                const res = await fetch(url, { method, headers: {'x-admin-token': adminToken, 'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : null });
                return res.ok ? await res.json() : null;
            }
        };

        document.getElementById('login-btn').onclick = async () => {
            adminToken = document.getElementById('admin-token').value;
            const res = await api.req('getStats');
            if (res) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('navigation').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                updateDash(res);
            }
        };

        document.querySelectorAll('.nav-tab').forEach(t => {
            t.onclick = async () => {
                document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                const v = t.dataset.view;
                document.getElementById('view-'+v).classList.add('active');
                if (v === 'dashboard') updateDash();
                if (v === 'users') loadUsers();
                if (v === 'licenses') loadLicenses();
                if (v === 'system') loadSystem();
            };
        });

        async function updateDash(s) {
            const stats = s || await api.req('getStats');
            document.getElementById('stat-total-users').innerText = stats.totalUsers;
            document.getElementById('stat-active-today').innerText = stats.activeToday;
            document.getElementById('stat-bans').innerText = stats.totalBans;
            const cfg = await api.req();
            document.getElementById('broadcast-msg').value = cfg.m || '';
        }

        async function loadUsers() {
            allUsers = await api.req('getUsers');
            const tbody = document.querySelector('#users-table tbody');
            tbody.innerHTML = '';
            allUsers.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${u.name}</td><td>${u.server}</td><td>${u.level}</td><td>${new Date(u.lastSeen).toLocaleTimeString()}</td><td><button onclick="openUser('${u.id}')">EDIT</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function openUser(id) {
            const u = allUsers.find(x => x.id === id); selectedId = id;
            document.getElementById('modal-name').innerText = u.name;
            document.getElementById('user-note').value = u.note || '';
            document.getElementById('user-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('user-modal').classList.remove('active'); }

        async function loadLicenses() {
            const lics = await api.req('getLicenses');
            const tbody = document.querySelector('#lic-table tbody');
            tbody.innerHTML = '';
            lics.forEach(l => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${l.id}</td><td>${new Date(l.expiry).toLocaleDateString()}</td><td><button onclick="delLic('${l.id}')">X</button></td>`;
                tbody.appendChild(tr);
            });
        }

        async function loadSystem() {
            const cfg = await api.req();
            document.getElementById('maint-mode').checked = cfg.s;
            document.getElementById('gift-days').value = cfg.license_days || 365;
        }

        document.getElementById('save-system-btn').onclick = async () => {
            const cfg = { s: document.getElementById('maint-mode').checked, license_days: parseInt(document.getElementById('gift-days').value), m: document.getElementById('broadcast-msg').value };
            await api.req('', 'POST', cfg); alert('Sistema guardado');
        };

        document.getElementById('save-license-btn').onclick = async () => {
            const id = document.getElementById('target-user-id').value;
            const expiry = new Date(document.getElementById('target-expiry').value).getTime();
            await api.req('setLicense', 'POST', { id, expiry }); loadLicenses();
        };
    </script>
</body>
</html>
